<?xml version="1.0" encoding="UTF-8"?>
<svg version="1.2" baseProfile="tiny-ps"
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 500 500"
  width="500" height="500">
  <title>Olivier Derval</title>

  <rect width="500" height="500" fill="#FFFFFF"/>

  <!-- Base couronne (centrée à x=250) -->
  <rect x="200" y="105" width="100" height="10" fill="#787878"/>

  <!-- 5 dents graduées (centrées à x=250, span 92px : de 204 à 296) -->
  <rect x="204" y="77" width="8" height="28" rx="1" fill="#787878"/>
  <rect x="224" y="70" width="8" height="35" rx="1" fill="#787878"/>
  <rect x="246" y="64" width="8" height="41" rx="1" fill="#787878"/>
  <rect x="268" y="70" width="8" height="35" rx="1" fill="#787878"/>
  <rect x="288" y="77" width="8" height="28" rx="1" fill="#787878"/>

  <!-- Bouclier - bordure extérieure -->
  <path d="M 168,115 L 332,115 L 332,240 Q 332,296 250,305 Q 168,296 168,240 Z"
        fill="none" stroke="#787878" stroke-width="2.0"/>

  <!-- Bouclier - bordure intérieure -->
  <path d="M 177,124 L 323,124 L 323,238 Q 323,289 250,297 Q 177,289 177,238 Z"
        fill="none" stroke="#787878" stroke-width="1.0"/>

  <!-- Lettre O -->
  <text x="250" y="243"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="95" font-weight="400" fill="#787878">O</text>

  <!-- OLIVIER DERVAL -->
  <text x="250" y="348"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="27" font-weight="400" fill="#606060"
    letter-spacing="9">OLIVIER DERVAL</text>

  <!-- Ligne séparatrice -->
  <line x1="68" y1="362" x2="432" y2="362"
        stroke="#CCCCCC" stroke-width="0.7"/>

  <!-- Sous-titre -->
  <text x="250" y="382"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="10" font-weight="400" fill="#AAAAAA"
    letter-spacing="3">CONSEILLER EN S&#201;CURIT&#201; FINANCI&#200;RE</text>

</svg>
